<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucien OS - Minimal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0a0a0a; 
            color: #d1d1d1;
            letter-spacing: -0.01em;
        }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .nav-btn { color: #525252; transition: color 0.2s; }
        .nav-btn.active { color: #ffffff; }
        
        input, button, .card {
            background: #121212;
            border: 1px solid #1f1f1f;
        }
    </style>
</head>
<body class="max-w-3xl mx-auto px-6 py-12 md:py-20">

    <nav class="flex gap-6 mb-16 text-sm font-medium border-b border-white/5 pb-4">
        <button onclick="showPage('home')" class="nav-btn active" id="btn-home">Aujourd'hui</button>
        <button onclick="showPage('todo')" class="nav-btn" id="btn-todo">Missions</button>
        <button onclick="showPage('links')" class="nav-btn" id="btn-links">Liens</button>
        <button onclick="showPage('settings')" class="nav-btn" id="btn-settings"><i class="fa-solid fa-gear"></i></button>
    </nav>

    <main>
        <section id="home" class="page active space-y-12">
            <header>
                <div id="clock" class="text-4xl font-light text-white mb-1">00:00</div>
                <div id="date" class="text-sm text-neutral-500 uppercase tracking-widest">Mercredi 8 Avril</div>
            </header>

            <div class="space-y-8">
                <div>
                    <h3 class="text-xs font-bold text-neutral-600 uppercase mb-4 tracking-tighter">En cours</h3>
                    <div id="home-tasks" class="space-y-3 text-sm italic text-neutral-400">
                        </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="card p-4 rounded-lg">
                        <span class="text-[10px] text-neutral-500 uppercase">Focus</span>
                        <div id="timer-display" class="text-xl text-white mt-1">25:00</div>
                    </div>
                    <div class="card p-4 rounded-lg">
                        <span class="text-[10px] text-neutral-500 uppercase">Dépenses</span>
                        <div id="total-finance" class="text-xl text-white mt-1">0,00 €</div>
                    </div>
                </div>
            </div>
        </section>

        <section id="todo" class="page space-y-8">
            <div class="flex gap-2">
                <input type="text" id="task-input" placeholder="Ajouter..." class="flex-1 bg-transparent border-b border-neutral-800 p-2 outline-none focus:border-white transition">
                <button onclick="addTask()" class="text-xs uppercase tracking-widest px-4">Ajouter</button>
            </div>
            <div id="task-list" class="space-y-4"></div>
        </section>

        <section id="links" class="page">
            <div id="links-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            <div class="mt-12 pt-8 border-t border-white/5">
                <p class="text-[10px] uppercase text-neutral-600 mb-4">Nouveau lien</p>
                <div class="flex gap-3">
                    <input type="text" id="link-name" placeholder="Nom" class="w-1/3 bg-transparent border-b border-neutral-800 p-2 text-sm outline-none">
                    <input type="text" id="link-url" placeholder="URL" class="flex-1 bg-transparent border-b border-neutral-800 p-2 text-sm outline-none">
                    <button onclick="saveLink()" class="text-xs">OK</button>
                </div>
            </div>
        </section>

        <section id="settings" class="page space-y-10">
            <h2 class="text-xl text-white">Paramètres</h2>
            
            <div class="space-y-6">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-sm">Nom d'utilisateur</p>
                        <p class="text-xs text-neutral-500">Comment le système t'appelle.</p>
                    </div>
                    <input type="text" id="user-name-input" onchange="updateName(this.value)" placeholder="Lucien" class="bg-neutral-900 border-none rounded px-3 py-1 text-sm outline-none">
                </div>

                <div class="pt-6 border-t border-white/5">
                    <p class="text-sm text-red-500 mb-2">Zone de danger</p>
                    <button onclick="clearAllData()" class="text-xs bg-red-900/10 text-red-500 border border-red-900/20 px-4 py-2 rounded hover:bg-red-900/20 transition">
                        Réinitialiser toutes les données
                    </button>
                </div>

                <div class="pt-6 text-[10px] text-neutral-600">
                    <p>Lucien OS - Version 2.0.0 (Minimalist Edition)</p>
                    <p>Les données sont stockées localement sur ce navigateur.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // NAVIGATION
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            refreshHome();
        }

        // TIME
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').innerText = now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateTime, 1000); updateTime();

        // TASKS
        let tasks = JSON.parse(localStorage.getItem('tasks_v2')) || [];
        function addTask() {
            const input = document.getElementById('task-input');
            if(!input.value) return;
            tasks.push({ text: input.value, done: false });
            input.value = '';
            renderTasks();
        }
        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = tasks.map((t, i) => `
                <div class="flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <div onclick="toggleTask(${i})" class="w-4 h-4 border border-neutral-700 rounded-sm cursor-pointer flex items-center justify-center">
                            ${t.done ? '<div class="w-2 h-2 bg-white"></div>' : ''}
                        </div>
                        <span class="text-sm ${t.done ? 'text-neutral-600 line-through' : ''}">${t.text}</span>
                    </div>
                    <button onclick="deleteTask(${i})" class="opacity-0 group-hover:opacity-100 text-neutral-700 hover:text-white transition">×</button>
                </div>
            `).join('');
            localStorage.setItem('tasks_v2', JSON.stringify(tasks));
            refreshHome();
        }
        function toggleTask(i) { tasks[i].done = !tasks[i].done; renderTasks(); }
        function deleteTask(i) { tasks.splice(i, 1); renderTasks(); }

        // LINKS
        let links = JSON.parse(localStorage.getItem('user_links')) || [];
        function saveLink() {
            const n = document.getElementById('link-name'), u = document.getElementById('link-url');
            if(!n.value || !u.value) return;
            links.push({ name: n.value, url: u.value.startsWith('http') ? u.value : 'https://' + u.value });
            n.value = ''; u.value = ''; renderLinks();
            localStorage.setItem('user_links', JSON.stringify(links));
        }
        function renderLinks() {
            document.getElementById('links-grid').innerHTML = links.map((l, i) => `
                <div class="card p-4 rounded flex justify-between items-center group">
                    <a href="${l.url}" target="_blank" class="text-sm hover:text-white transition">${l.name}</a>
                    <button onclick="deleteLink(${i})" class="opacity-0 group-hover:opacity-100 text-neutral-700 transition">×</button>
                </div>
            `).join('');
        }
        function deleteLink(i) { links.splice(i, 1); renderLinks(); localStorage.setItem('user_links', JSON.stringify(links)); }

        // SETTINGS & DATA
        function updateName(val) {
            localStorage.setItem('user_name', val);
            alert("Nom mis à jour");
        }
        function clearAllData() {
            if(confirm("Voulez-vous vraiment effacer toutes vos données ?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // HOME REFRESH
        function refreshHome() {
            const preview = document.getElementById('home-tasks');
            const pending = tasks.filter(t => !t.done);
            preview.innerHTML = pending.length ? pending.slice(0, 3).map(t => `<div>• ${t.text}</div>`).join('') : 'Rien de prévu.';
            
            const exp = JSON.parse(localStorage.getItem('expenses')) || [];
            const total = exp.reduce((sum, e) => sum + e.amount, 0);
            document.getElementById('total-finance').innerText = total.toFixed(2) + " €";
        }

        renderTasks(); renderLinks(); refreshHome();
    </script>
</body>
</html>
