<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucien OS - Redesign</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg: #05070a;
            --card: rgba(17, 24, 39, 0.7);
            --accent: #3b82f6;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: #f3f4f6;
            background-image: radial-gradient(circle at top right, #1e293b 0%, #05070a 50%);
            min-height: 100-vh;
        }

        .bento-card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 1.5rem;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .bento-card:hover {
            border-color: rgba(59, 130, 246, 0.3);
        }

        .page { display: none; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-link.active { color: var(--accent); background: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 glass px-6 py-3 rounded-full border border-white/10 flex gap-8 z-50 bg-black/50 backdrop-blur-lg">
        <button onclick="showPage('home')" class="nav-link active hover:text-blue-400 transition"><i class="fa-solid fa-grid-2 text-xl"></i></button>
        <button onclick="showPage('todo')" class="nav-link hover:text-blue-400 transition"><i class="fa-solid fa-list-check text-xl"></i></button>
        <button onclick="showPage('calendar')" class="nav-link hover:text-blue-400 transition"><i class="fa-solid fa-calendar text-xl"></i></button>
        <button onclick="showPage('finance')" class="nav-link hover:text-blue-400 transition"><i class="fa-solid fa-wallet text-xl"></i></button>
        <button onclick="showPage('links')" class="nav-link hover:text-blue-400 transition"><i class="fa-solid fa-link text-xl"></i></button>
    </nav>

    <div class="max-w-6xl mx-auto mb-24">
        
        <section id="home" class="page active">
            <header class="mb-10">
                <h1 id="greeting" class="text-4xl font-bold tracking-tight">Bonjour, Lucien.</h1>
                <p id="full-date" class="text-slate-500 mt-2 capitalize"></p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bento-card md:col-span-2 flex flex-col justify-between min-h-[200px] bg-gradient-to-br from-blue-600/20 to-transparent">
                    <div>
                        <span class="text-blue-400 text-xs font-bold uppercase tracking-widest">Activité actuelle</span>
                        <h2 class="text-2xl font-semibold mt-2">Missions prioritaires</h2>
                    </div>
                    <div id="home-tasks-preview" class="space-y-2 mt-4 text-sm text-slate-300">
                        </div>
                </div>

                <div class="bento-card flex flex-col items-center justify-center text-center">
                    <div id="big-clock" class="text-5xl font-bold mb-2">00:00</div>
                    <div class="text-slate-400 flex items-center gap-2">
                        <i class="fa-solid fa-cloud-sun text-orange-400"></i> 
                        <span>Grez-Neuville, 16°C</span>
                    </div>
                </div>

                <div class="bento-card">
                    <h3 class="text-xs font-bold text-slate-500 uppercase mb-4">Focus</h3>
                    <div id="timer-display" class="text-4xl font-mono font-bold mb-4">25:00</div>
                    <button onclick="toggleTimer()" id="btn-timer" class="w-full bg-white text-black rounded-xl py-2 font-bold hover:bg-slate-200 transition">Start</button>
                </div>

                <div class="bento-card">
                    <h3 class="text-xs font-bold text-slate-500 uppercase mb-4">Finances</h3>
                    <p class="text-3xl font-bold" id="home-total-finance">0,00 €</p>
                    <p class="text-xs text-red-400 mt-2">Dépenses du mois</p>
                </div>

                <div class="bento-card">
                    <h3 class="text-xs font-bold text-slate-500 uppercase mb-4">Favoris</h3>
                    <div id="home-links-preview" class="flex gap-4 text-xl text-slate-400">
                        </div>
                </div>
            </div>
        </section>

        <section id="todo" class="page max-w-2xl mx-auto">
            <h2 class="text-3xl font-bold mb-8">Missions</h2>
            <div class="bento-card mb-6">
                <div class="flex gap-3">
                    <input type="text" id="task-input" placeholder="Nouvelle tâche..." class="flex-1 bg-white/5 border-none rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="addTask()" class="bg-blue-600 px-6 rounded-xl font-bold"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
            <div id="task-list" class="space-y-3">
                </div>
        </section>

        <section id="calendar" class="page bento-card">
            <div class="flex justify-between items-center mb-6">
                <h2 id="cal-month-year" class="text-xl font-bold"></h2>
                <div class="flex gap-2">
                    <button onclick="changeMonth(-1)" class="p-2 rounded-lg bg-white/5 hover:bg-white/10"><i class="fa-solid fa-chevron-left"></i></button>
                    <button onclick="changeMonth(1)" class="p-2 rounded-lg bg-white/5 hover:bg-white/10"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-2 text-center text-sm"></div>
        </section>

        <section id="finance" class="page bento-card max-w-2xl mx-auto">
            <h2 class="text-xl font-bold mb-6">Gestion Financière</h2>
            <div class="flex gap-2 mb-6">
                <input type="text" id="exp-name" placeholder="Dépense..." class="flex-1 bg-white/5 rounded-xl px-4 py-2">
                <input type="number" id="exp-amount" placeholder="€" class="w-24 bg-white/5 rounded-xl px-4 py-2">
                <button onclick="addExpense()" class="bg-emerald-600 px-4 rounded-xl">Ok</button>
            </div>
            <div id="expense-list" class="space-y-2"></div>
        </section>

        <section id="links" class="page">
            <h2 class="text-xl font-bold mb-6">Mes Raccourcis</h2>
            <div id="links-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            <div class="mt-8 bento-card border-dashed">
                <h3 class="text-sm font-bold mb-4 text-slate-500">Ajouter un favori</h3>
                <div class="flex flex-wrap gap-2">
                    <input type="text" id="link-name" placeholder="Nom" class="bg-white/5 rounded-lg px-4 py-2 text-sm">
                    <input type="text" id="link-url" placeholder="URL" class="bg-white/5 rounded-lg px-4 py-2 text-sm flex-1">
                    <button onclick="saveNewLink()" class="bg-blue-600 px-4 py-2 rounded-lg text-sm">Ajouter</button>
                </div>
            </div>
        </section>

    </div>

    <script>
        // NAVIGATION
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
            updateHomeView();
        }

        // TIME & DATE
        function updateTime() {
            const now = new Date();
            document.getElementById('big-clock').innerText = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('full-date').innerText = now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
            
            const hours = now.getHours();
            let greet = "Bonsoir";
            if(hours < 18) greet = "Bonjour";
            if(hours < 5) greet = "Bonne nuit";
            document.getElementById('greeting').innerText = `${greet}, Lucien.`;
        }
        setInterval(updateTime, 1000); updateTime();

        // TASKS
        let tasks = JSON.parse(localStorage.getItem('tasks_v2')) || [];
        function addTask() {
            const input = document.getElementById('task-input');
            if(!input.value) return;
            tasks.push({ text: input.value, done: false });
            input.value = '';
            renderTasks();
            updateHomeView();
        }
        function toggleTask(i) { tasks[i].done = !tasks[i].done; renderTasks(); updateHomeView(); }
        function deleteTask(i) { tasks.splice(i, 1); renderTasks(); updateHomeView(); }
        
        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = tasks.map((t, i) => `
                <div class="bento-card flex items-center justify-between py-3">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${i})" class="w-6 h-6 rounded-full border-white/10 bg-white/5 text-blue-500">
                        <span class="${t.done?'line-through text-slate-500':''}">${t.text}</span>
                    </div>
                    <button onclick="deleteTask(${i})" class="text-slate-500 hover:text-red-400"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
            localStorage.setItem('tasks_v2', JSON.stringify(tasks));
        }

        // ACCUEIL DYNAMIQUE
        function updateHomeView() {
            const preview = document.getElementById('home-tasks-preview');
            const pending = tasks.filter(t => !t.done);
            preview.innerHTML = pending.length ? pending.slice(0, 3).map(t => `
                <div class="flex items-center gap-2">
                    <div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>
                    <span>${t.text}</span>
                </div>
            `).join('') : '<p class="text-slate-500 italic">Tout est à jour !</p>';

            const totalExp = expenses.reduce((sum, e) => sum + e.amount, 0);
            document.getElementById('home-total-finance').innerText = totalExp.toFixed(2) + " €";

            const linksPrev = document.getElementById('home-links-preview');
            linksPrev.innerHTML = userLinks.slice(0, 5).map(l => `<a href="${l.url}" target="_blank"><i class="fa-solid ${l.icon || 'fa-link'}"></i></a>`).join('');
        }

        // CALENDAR (LOGIC RE-USED)
        let curDate = new Date();
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            document.getElementById('cal-month-year').innerText = new Intl.DateTimeFormat('fr-FR', {month: 'long', year: 'numeric'}).format(curDate);
            const first = new Date(curDate.getFullYear(), curDate.getMonth(), 1).getDay() || 7;
            const last = new Date(curDate.getFullYear(), curDate.getMonth() + 1, 0).getDate();
            for(let i=1; i<first; i++) grid.innerHTML += '<div></div>';
            for(let i=1; i<=last; i++) {
                const isToday = i === new Date().getDate() && curDate.getMonth() === new Date().getMonth() ? 'bg-blue-600 font-bold' : 'bg-white/5';
                grid.innerHTML += `<div class="p-3 rounded-xl ${isToday}">${i}</div>`;
            }
        }
        function changeMonth(d) { curDate.setMonth(curDate.getMonth()+d); renderCalendar(); }

        // INITIALISATION
        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
        let userLinks = JSON.parse(localStorage.getItem('user_links')) || [{name:'GitHub', url:'https://github.com', icon:'fa-github'}];
        
        function addExpense() {
            const n = document.getElementById('exp-name'), a = document.getElementById('exp-amount');
            if(!n.value || !a.value) return;
            expenses.push({name:n.value, amount:parseFloat(a.value)});
            n.value=''; a.value=''; renderExpenses(); updateHomeView();
        }
        function renderExpenses() {
            document.getElementById('expense-list').innerHTML = expenses.map(e => `<div class="flex justify-between p-3 bg-white/5 rounded-xl text-sm"><span>${e.name}</span><span class="font-bold">-${e.amount}€</span></div>`).join('');
            localStorage.setItem('expenses', JSON.stringify(expenses));
        }

        function saveNewLink() {
            const n = document.getElementById('link-name'), u = document.getElementById('link-url');
            if(!n.value || !u.value) return;
            userLinks.push({name:n.value, url: u.value.startsWith('http')?u.value:'https://'+u.value, icon:'fa-link'});
            n.value=''; u.value=''; renderLinks(); updateHomeView();
            localStorage.setItem('user_links', JSON.stringify(userLinks));
        }
        function renderLinks() {
            document.getElementById('links-grid').innerHTML = userLinks.map(l => `
                <a href="${l.url}" target="_blank" class="bento-card flex flex-col items-center gap-2">
                    <i class="fa-solid ${l.icon} text-2xl text-blue-400"></i>
                    <span class="text-xs font-medium">${l.name}</span>
                </a>
            `).join('');
        }

        // TIMER
        let timeLeft = 1500, timerId = null;
        function toggleTimer() {
            if(timerId) { clearInterval(timerId); timerId=null; document.getElementById('btn-timer').innerText="Start"; }
            else { timerId = setInterval(()=>{ 
                timeLeft--; 
                let m=Math.floor(timeLeft/60), s=timeLeft%60;
                document.getElementById('timer-display').innerText = `${m}:${s<10?'0'+s:s}`;
            },1000); document.getElementById('btn-timer').innerText="Pause"; }
        }

        renderTasks(); renderCalendar(); renderExpenses(); renderLinks(); updateHomeView();
    </script>
</body>
</html>
