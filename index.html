<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucien OS - Adaptive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            --bg: #fafafa;
            --text: #171717;
            --card-bg: #ffffff;
            --border: #e5e5e5;
            --accent: #3b82f6;
        }

        .dark {
            --bg: #0a0a0a;
            --text: #e5e5e5;
            --card-bg: #141414;
            --border: #262626;
            --accent: #60a5fa;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
        }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            transition: all 0.2s ease;
        }

        .nav-link { color: #737373; transition: all 0.2s; }
        .nav-link.active { color: var(--accent); font-weight: 600; }

        input {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            outline: none;
        }
        input:focus { border-color: var(--accent); }
    </style>
</head>
<body class="max-w-4xl mx-auto px-6 py-8">

    <nav class="flex justify-between items-center mb-12">
        <div class="flex gap-8 text-sm">
            <button onclick="showPage('home')" class="nav-link active" id="link-home">Accueil</button>
            <button onclick="showPage('todo')" class="nav-link" id="link-todo">Missions</button>
            <button onclick="showPage('links')" class="nav-link" id="link-links">Favoris</button>
        </div>
        <button onclick="showPage('settings')" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-black/5 dark:hover:bg-white/5 transition">
            <i class="fa-solid fa-sliders text-neutral-500"></i>
        </button>
    </nav>

    <main>
        <section id="home" class="page active">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card md:col-span-2 py-10 flex flex-col items-center justify-center">
                    <div id="clock" class="text-6xl font-semibold tracking-tighter mb-2">00:00</div>
                    <div id="date" class="text-sm text-neutral-500 uppercase tracking-widest">Mercredi 8 Avril</div>
                </div>

                <div class="card">
                    <h3 class="text-xs font-bold text-neutral-400 uppercase mb-4">À faire</h3>
                    <div id="home-tasks" class="space-y-3 text-sm"></div>
                </div>

                <div class="card flex flex-col justify-between">
                    <div>
                        <h3 class="text-xs font-bold text-neutral-400 uppercase mb-4">Focus</h3>
                        <div id="timer-display" class="text-3xl font-medium">25:00</div>
                    </div>
                    <button onclick="toggleTimer()" id="btn-timer" class="mt-4 text-xs font-bold text-blue-500 uppercase text-left">Démarrer</button>
                </div>
            </div>
        </section>

        <section id="todo" class="page max-w-xl mx-auto">
            <div class="flex gap-2 mb-8">
                <input type="text" id="task-input" placeholder="Ajouter une tâche..." class="flex-1">
                <button onclick="addTask()" class="bg-blue-500 text-white px-6 rounded-lg font-medium hover:bg-blue-600">Ajouter</button>
            </div>
            <div id="task-list" class="space-y-3"></div>
        </section>

        <section id="links" class="page">
            <div id="links-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-12"></div>
            <div class="card border-dashed">
                <h3 class="text-xs font-bold text-neutral-400 mb-4 uppercase">Ajouter un lien</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="link-name" placeholder="Nom">
                    <input type="text" id="link-url" placeholder="URL">
                    <button onclick="saveLink()" class="bg-neutral-200 dark:bg-neutral-800 rounded-lg text-sm font-medium">Enregistrer</button>
                </div>
            </div>
        </section>

        <section id="settings" class="page max-w-xl mx-auto">
            <h2 class="text-2xl font-semibold mb-8">Paramètres</h2>
            
            <div class="card space-y-8">
                <div class="flex justify-between items-center">
                    <span>Apparence</span>
                    <button onclick="toggleTheme()" class="px-4 py-2 bg-neutral-100 dark:bg-neutral-800 rounded-lg text-sm flex items-center gap-2 transition">
                        <i class="fa-solid fa-circle-half-stroke"></i>
                        Changer le mode
                    </button>
                </div>

                <div class="pt-6 border-t border-neutral-100 dark:border-neutral-800">
                    <span class="text-red-500 text-sm block mb-4">Données</span>
                    <button onclick="clearAllData()" class="text-xs text-neutral-500 underline">Réinitialiser tout le système</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // NAVIGATION
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(document.getElementById('link-'+id)) document.getElementById('link-'+id).classList.add('active');
            refreshHome();
        }

        // THÈME (Mode Clair / Sombre)
        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');

        // HORLOGE
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').innerText = now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateTime, 1000); updateTime();

        // LOGIQUE TÂCHES
        let tasks = JSON.parse(localStorage.getItem('tasks_v2')) || [];
        function addTask() {
            const input = document.getElementById('task-input');
            if(!input.value) return;
            tasks.push({ text: input.value, done: false });
            input.value = ''; renderTasks();
        }
        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = tasks.map((t, i) => `
                <div class="card py-3 flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <div onclick="toggleTask(${i})" class="w-5 h-5 border-2 rounded-full border-neutral-300 dark:border-neutral-700 cursor-pointer flex items-center justify-center transition">
                            ${t.done ? '<div class="w-2.5 h-2.5 bg-blue-500 rounded-full"></div>' : ''}
                        </div>
                        <span class="${t.done ? 'text-neutral-400 line-through' : ''}">${t.text}</span>
                    </div>
                    <button onclick="deleteTask(${i})" class="opacity-0 group-hover:opacity-100 text-neutral-400">×</button>
                </div>
            `).join('');
            localStorage.setItem('tasks_v2', JSON.stringify(tasks));
            refreshHome();
        }
        function toggleTask(i) { tasks[i].done = !tasks[i].done; renderTasks(); }
        function deleteTask(i) { tasks.splice(i, 1); renderTasks(); }

        // FAVORIS
        let links = JSON.parse(localStorage.getItem('user_links')) || [];
        function saveLink() {
            const n = document.getElementById('link-name'), u = document.getElementById('link-url');
            if(!n.value || !u.value) return;
            links.push({ name: n.value, url: u.value.startsWith('http') ? u.value : 'https://' + u.value });
            n.value = ''; u.value = ''; renderLinks();
            localStorage.setItem('user_links', JSON.stringify(links));
        }
        function renderLinks() {
            document.getElementById('links-grid').innerHTML = links.map((l, i) => `
                <div class="card relative group flex items-center justify-center py-8">
                    <a href="${l.url}" target="_blank" class="font-medium text-sm hover:text-blue-500 transition">${l.name}</a>
                    <button onclick="deleteLink(${i})" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-neutral-400">×</button>
                </div>
            `).join('');
        }
        function deleteLink(i) { links.splice(i, 1); renderLinks(); localStorage.setItem('user_links', JSON.stringify(links)); }

        // TIMER
        let timeLeft = 1500, timerId = null;
        function toggleTimer() {
            const btn = document.getElementById('btn-timer');
            if(timerId) { 
                clearInterval(timerId); timerId=null; 
                btn.innerText="Démarrer"; 
            } else {
                timerId = setInterval(() => {
                    timeLeft--;
                    let m=Math.floor(timeLeft/60), s=timeLeft%60;
                    document.getElementById('timer-display').innerText = `${m}:${s<10?'0'+s:s}`;
                    if(timeLeft <= 0) clearInterval(timerId);
                }, 1000);
                btn.innerText="Pause";
            }
        }

        function refreshHome() {
            const prev = document.getElementById('home-tasks');
            const pending = tasks.filter(t => !t.done);
            prev.innerHTML = pending.length ? pending.slice(0, 3).map(t => `<div class="py-1">• ${t.text}</div>`).join('') : '<span class="text-neutral-500">Libre comme l\'air.</span>';
        }

        function clearAllData() { if(confirm("Effacer tout ?")) { localStorage.clear(); location.reload(); } }

        renderTasks(); renderLinks(); refreshHome();
    </script>
</body>
</html>
